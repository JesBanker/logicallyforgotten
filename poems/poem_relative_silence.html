	<p>
	『滴答』<br>
	<br>
	<br>
	他躺在床，看著時鐘，窗外的藍光照在臉上。<br>
	『滴答』<br>
	<br>
	<br>
	『滴答...踏 踏 踏』<br>
	“現在！？” <br>
	他還躺著。<br>
	<br>
	『哼哼哼~』<br>
	『卡噠』<br>
	『咳呃，咳呃…』<br>
	<br>
	『滴答』<br>
	<br>
	<br>
	『滴答』<br>
	<br>
	<br>
	『滴...嗚嗯！』<br>
	“幹。” <br>
	他直起身。<br>
	<br>
	『咳痾!』
	<br>
	<br>
	下了床，離開了光，開了風扇。<br>
	躺了回去，回到了光裡。<br>
	『嗡嗡嗡』<br>
	<br>
	『嗡嗡...嗚嗯！』<br>
	“不錯。”<br>
	</p>
