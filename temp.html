<!DOCTYPE html>
<html>
  <head>
	   <link rel="icon" type="image/png" href="logically _icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
		
        body {
			background-color: #000000;
			color: #f2e3d8;
			
			/* Font stays at 16px until the screen grows, 
			then scales at 2% of screen width, 
			but stops growing at 24px */
			font-size: clamp(16px, 1vw + 10px, 20px);
			
			margin: 0px auto;
			font-family: courier, monospace;
			line-height: 1.2;
			text-align: left;
        }
		
		@media (max-width: 600px){
			body {
				font-size: 16px;
			}
		}
		
				
		.max1200 {
			max-width: 1200px;
			margin: 0px auto;
		}
		
		.max1200 p,
		.max1200 h1 {
			margin-left: 50px;
			/*
			border: solid;
			*/
		}
		
		p span.voice {
			font-style: italic;
			opacity: 0.8;
			/*
			padding-left: 10px;
			*/
		}
		
		hr {
			border: 0;
			border-top: 1px solid #f2e3d8; /* 使用你的文字顏色 */
			margin: 20px 0; /* 增加上下間距，讓文字有呼吸空間 */
			opacity: 0.5;   /* 稍微透明一點點，更有高級感 */
		}
		
		
    </style>
  </head>
  <body>
    <div class="max1200"><h1>Temp... how do you find here?</h1></div>
    <hr>
	<div class="max1200">
    <p>
      滾動, 結束.<br>
      在滾, 在結.<br>
      還滾, 還結.<br>
      時針過了兩個數字.<br>
      仍...沒了.<br>
      同時間.<br>
      沒了.<br>
	  <br>
	</p>
	</div>
	<hr>
	<div class ="max1200">
	 <p>
		平靜, 應該是. <span class="voice">"說話了."</span><br>
		不. <br>
		...對. <br>
		不對. <br> 
		<span class="voice">"他沒回."</span><br>
		...對. <br>
		不對! <br>
		你對. <br>
		不平, 確實是.  <span class ="voice">"說不出."</span><br>
	  <br>
    </p>
	</div>
  </body>  
</html>
