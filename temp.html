<!DOCTYPE html>

    <style>
		
        :root {
			/* 定義全站的主色調 (RGB 數值) */
			--main-r: 242;
			--main-g: 227;
			--main-b: 216;
			--main-padR: 20px;
			--main-rgb: 242, 227, 216;
			--main-secColor: 54, 41, 37;
		}
		
		body {
			
			overflow-x: hidden;
			background-color: #000000;
			color: rgb(var(--main-r), var(--main-g), var(--main-b));
			
			/* Font stays at 16px until the screen grows, 
			then scales at 2% of screen width, 
			but stops growing at 24px */
			font-size: clamp(16px, 1vw + 10px, 20px);
			
			font-family: courier, monospace;
			line-height: 1.2;
			text-align: left;
			
        }
			
		.cMaxWidth {
			margin: 0px auto;
			max-width: clamp(800px, var(--max, 100%), 100%);
		}
		
		@media(max-width: 600px){
			.cMaxWidth{
				font-size: 16px;
				min-width: 95vw;
			}
		
		}

		.cMaxWidth p,
		.cMaxWidth h1 {
			padding-left: 30px;
			margin-left: 20px;
			border-left: 1px solid #f2e3d880;
			/*
			border: solid;
			*/
		}
		
		.cMaxWidth hr{
			opacity: 0.25;
		}
		
		.noBorder h1 {
			border-left: none !important; /*force use?*/
			padding-left: 30px;
		}	
		
		p span.voice {
			font-style: italic;
			opacity: 0.8;
			/*
			padding-left: 10px;
			*/
		}
		
		hr {
			border: 0;
			border-top: 1px solid #f2e3d8; /* 使用的文字顏色 */
			margin: 20px 0; /* 增加上下間距 */
			opacity: 0.5;   /* 稍微透明一點點 */
		}
		
		.lNRText{
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
		}
		
		.line {
			display: flex;
			align-items: flex-end
		}
		
		.right {
			text-align: right !important;
		}
		
		.rPadding {
			padding-right: 20px !important;
		}
		
		.date {
			float: right;
			color: rgba(252, 237, 226, 0.40);
			padding-right: var(--padR ,var(--main-paddingR, 20px) );
		}
		
		.opacity {
			opacity: var(--op,1);
		}
		
		.c_rgba { /*color rgba*/
			/* 加上透明度，顏色會自動跟隨主色調 */
			color: rgba(
			var(--rgb , var(--main-rgb, 255,255,255)),
			var(--a, 1)
			);
		}

			align: center;
			
			display: flex;
			justify-content: center;
			align-items: center;
			padding-bottom: 4%;
			
			overflow: hidden;

		.game-container iframe{
