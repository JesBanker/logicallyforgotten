<!DOCTYPE html>
<html>
  <head>
	   <link rel="icon" type="image/png" href="logically_icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
		
        :root {
			/* 定義全站的主色調 (RGB 數值) */
			--main-r: 242;
			--main-g: 227;
			--main-b: 216;
		}
		
		body {
			background-color: #000000;
			color: rgb(var(--main-r), var(--main-g), var(--main-b));
			
			/* Font stays at 16px until the screen grows, 
			then scales at 2% of screen width, 
			but stops growing at 24px */
			font-size: clamp(16px, 1vw + 10px, 20px);
			
			margin: 0px auto;
			font-family: courier, monospace;
			line-height: 1.2;
			text-align: left;
        }
		
		@media (max-width: 600px){
			body {
				font-size: 16px;
			}
		}
		
				
		.max1200 {
			max-width: 1200px;
			margin: 0px auto;
			
			/*
			border-left: 1px solid #f2e3d880;
			
			border-left: 1px solid rgba(242, 227, 216, 0.8);
			
			padding-right: 10px;
			*/
		}
		
		.max1200 p,
		.max1200 h1 {
			padding-left: 30px;
			margin-left: 20px;
			border-left: 1px solid #f2e3d880;
			/*
			border: solid;
			*/
		}
		
		.noBorder h1 {
			border-left: none !important; /*force use?*/
			padding-left: 30px;
		}	
		
		p span.voice {
			font-style: italic;
			opacity: 0.8;
			/*
			padding-left: 10px;
			*/
		}
		
		hr {
			border: 0;
			border-top: 1px solid #f2e3d8; /* 使用的文字顏色 */
			margin: 20px 0; /* 增加上下間距 */
			opacity: 0.5;   /* 稍微透明一點點 */
		}
		
		.lNRText{
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
		}
		
		.line {
			display: flex;
			align-items: flex-end
		}
		
		.right {
			text-align: right !important;
		}
		
		.rPadding {
			padding-right: 20px !important;
		}
		
		.date {
			float: right;
			color: rgba(252, 237, 226, 0.40);
			padding-right: 20px;
		}
		
		.op25 {
			opacity: 0.25;
		}
		
		.c_rgba { /*color rgba*/
			/* 加上透明度，顏色會自動跟隨主色調 */
			color: rgba(
			var(--r ,var(--main-r) ), 
			var(--g ,var(--main-g) ),
			var(--b ,var(--main-b) ),
			var(--ap, 1));
		}		
		
		
    </style>
  </head>
  <body>
	<div class="max1200 noBorder"><h1>Temp... how do you find here?</h1></div>
    <hr>
	<div class="max1200">
    <p>
      滾動, 結束.<br>
      在滾, 在結.<br>
      還滾, 還結.<br>
      時針過了兩個數字.<br>
      仍...沒了.<br>
      同時間.<br>
      沒了.<br>
	  <br>
	</p>
	</div>
	<hr>
	<div class ="max1200">
	 <p>
		平靜, 應該是. <span class="voice">"說話了."</span><br>
		不. <br>
		...對. <br>
		不對. <br> 
		<span class="voice">"他沒回."</span><br>
		...對. <br>
		不對! <br>
		你對. <br>
		不平, 確實是.  <span class ="voice">"說不出."</span><br>
	  <br>
    </p>
	</div>
	<hr>
	<div class="max1200">
		<p class = "lNRText">
			<span>『滑動』</span>
			<span class= "c_rgba rPadding" style="--ap: 0.4;"> 23/04/26</span>
		</p>
			<!--<hr style="margin-left: 0px; opacity: 0.5;"> -->
			<hr class="op25"> 
		<p>
			滑動，結束。<br>
			在滑，在結。<br>	
			時針過了兩個數字。<br>
			<br>
			還滑，還結。<br>		
			仍……吧。<br>
			<br>
			滑不動了。<br>
			<br>
			沒了。<br>
			跳秒聲。<br>
			<span class = "voice">“得去睡了。”</span>
		</p>
	</div>
		<br>
		<hr>
		<div class ="max1200">
			<p>
				test
				<span class="date">Rtest</span>
			</p>
		</div>
  </body>  
</html>
